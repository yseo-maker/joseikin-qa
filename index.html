<strong>重要ポイント：</strong>
<ul>
<li>定額制サービスによる訓練を実施する場合は、通学制など他の方法と<strong>組み合わせることはできず</strong>、定額制サービスのみで実施する必要があります</li>

// ===== アプリロジック =====
let currentCat = "all";
let currentQuery = "";

function escapeRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, query) {
  if (!query.trim()) return text;
  const words = query.trim().split(/[\s\u3000]+/).filter(w => w.length > 0);
  let result = text;
  words.forEach(word => {
    const re = new RegExp(`(${escapeRe(word)})`, 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  });
  return result;
}

function score(item, query) {
  if (!query.trim()) return 1;
  const words = query.trim().split(/[\s\u3000]+/).filter(w => w.length > 0);
  let s = 0;
  words.forEach(w => {
    const lw = w.toLowerCase();
    // 質問文でのマッチは高スコア
    const qMatches = (item.q.toLowerCase().match(new RegExp(escapeRe(lw), 'g')) || []).length;
    // タグでのマッチ
    const tMatches = (item.tags || []).filter(t => t.toLowerCase().includes(lw)).length;
    // 回答文でのマッチ
    const aText = item.a.replace(/<[^>]+>/g, '').toLowerCase();
    const aMatches = (aText.match(new RegExp(escapeRe(lw), 'g')) || []).length;
    s += qMatches * 4 + tMatches * 3 + aMatches;
  });
  return s;
}

function render() {
  const q = currentQuery.trim();
  const list = document.getElementById("qaList");
  const countEl = document.getElementById("resultCount");

  let items = qaData;

  if (currentCat !== "all") {
    items = items.filter(item => item.cat === currentCat);
  }

  if (q) {
    items = items.filter(item => score(item, q) > 0);
    items.sort((a, b) => score(b, q) - score(a, q));
  }

  countEl.innerHTML = `<span>${items.length}</span> 件のQ&Aが見つかりました`;

  if (items.length === 0) {
    list.innerHTML = `<div class="no-result"><div class="icon">🔍</div><p>「${q}」に一致するQ&Aが見つかりませんでした。<br>別のキーワードで試してみてください。</p></div>`;
    return;
  }

  list.innerHTML = items.map(item => {
    const qText = q ? highlight(item.q, q) : item.q;
    const aText = q ? highlight(item.a, q) : item.a;
    return `
    <div class="qa-card">
      <div class="qa-question" onclick="this.closest('.qa-card').classList.toggle('open')">
        <div class="qa-q-icon">Q</div>
        <div class="qa-q-text">${qText}</div>
        <div class="qa-toggle">▼</div>
      </div>
      <div class="qa-answer">
        ${aText}
        <div class="category-label">カテゴリ: ${item.cat}</div>
      </div>
    </div>`;
  }).join("");
}

document.getElementById("searchInput").addEventListener("input", e => {
  currentQuery = e.target.value;
  render();
});

document.getElementById("filterTabs").addEventListener("click", e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  currentCat = tab.dataset.cat;
  render();
});
